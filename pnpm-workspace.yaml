packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  # Vite가 사용하는 네이티브 번들러 바이너리를 설치한다.
  esbuild: true
  # Next.js 이미지 최적화에 필요한 네이티브 바이너리를 설치한다.
  sharp: true
  # 개발·테스트용 Mock Service Worker 파일을 준비한다.
  msw: true

catalog:
  "@nestjs/common": ^11.1.6
  "@nestjs/core": ^11.1.6
  "@nestjs/platform-express": ^11.1.6
  "@types/node": ^24.13.3
  "@types/react": ^19.2.0
  "@types/react-dom": ^19.2.0
  "@vitejs/plugin-react": ^5.0.0
  # 2026년 5월 보안 릴리스의 Next 16 최소 패치 버전(16.2.6) 이상만 허용한다.
  next: ^16.2.6
  react: ^19.2.0
  react-dom: ^19.2.0
  tsx: ^4.20.0
  # Next.js가 지원하는 안정 TypeScript 계열을 공통으로 사용한다.
  typescript: ^5.9.3
  vite: ^7.0.0
